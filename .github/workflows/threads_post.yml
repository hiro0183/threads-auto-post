name: Threads自動投稿

on:
  # schedule は Render に統一したため無効化（2026-04-08）
  # 手動実行は残す
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic requests python-dotenv
      - name: 今日のJSONがなければ自動生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          if [ ! -f "posts/${DATE}.json" ]; then
            echo "posts/${DATE}.json が見つかりません。今日分を自動生成します..."
            python generate_daily_posts.py --today
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add posts/${DATE}.json
            git diff --staged --quiet || (git commit -m "今日分の投稿を自動生成: ${DATE} [skip ci]" && git pull --rebase -X ours && git push)
          else
            echo "posts/${DATE}.json が存在します。そのまま使用します"
          fi
      - name: 投稿実行
        env:
          THREADS_APP_ID: ${{ secrets.THREADS_APP_ID }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_runner.py
      - name: 投稿済み状態をコミット
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add state/
          git diff --staged --quiet || (git commit -m "投稿済み記録を更新 [skip ci]" && git pull --rebase -X ours && git push)
