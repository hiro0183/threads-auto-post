services:
  - type: web
    name: threads-auto-post
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: THREADS_APP_ID
        sync: false
      - key: THREADS_APP_SECRET
        sync: false
      - key: THREADS_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
